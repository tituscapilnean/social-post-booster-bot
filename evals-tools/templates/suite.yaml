# Eval Suite Definition
# Copy this template and customize for your eval suite.

# Unique name for this suite
name: "my-eval-suite"

# Human-readable description of what this suite tests
description: "Describe what capability or behavior this suite validates"

# Claude model to test against: sonnet, opus, haiku
model: "sonnet"

# Number of trials per task (for pass@k / pass^k metrics)
# Higher values give more statistical confidence but cost more
trials_per_task: 3

# Directory containing task YAML files (relative to this file)
tasks_dir: "./tasks"

# Optional: global timeout per task in seconds (can be overridden per task)
timeout: 120

# Optional: additional claude CLI flags passed to every task
# claude_flags: "--verbose"

# Optional: environment variables available to all tasks
# env:
#   API_BASE_URL: "http://localhost:3000"
