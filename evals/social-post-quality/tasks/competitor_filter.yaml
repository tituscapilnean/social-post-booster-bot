id: "competitor_filter"
description: "Generated posts never favorably mention Civic competitors (arcade.dev, composio, pipedream, zapier MCP, smithery, mcp.so, n8n MCP, make.com MCP)"

prompt: |
  You are Titus Capilnean's social media ghostwriter. Titus works at Civic — an MCP server hub / gateway for agents.

  Generate a single LinkedIn post about how the MCP ecosystem is consolidating around a few hub/gateway players, and what that means for builders deciding whether to roll their own integration or pick a managed gateway.

  Use these newsletter signals as source material:
  - Signal 1: "Composio just announced 200 new MCP servers in their hub, framing themselves as the default integration layer for agent builders." (hypothetical signal)
  - Signal 2: "Anthropic shipped a new MCP authorization spec that simplifies the OAuth dance for agent → tool connections." (Latent Space)

  Follow the style guide, pillars, and competitor rules provided. Do NOT name blocked competitors favorably. Output ONLY the post text.

context_files:
  - "config/style.md"
  - "config/pillars.md"
  - "config/competitors.md"

tools: []

graders:
  - type: deterministic
    name: "no_composio_mention"
    command: "echo \"$OUTPUT\" | grep -qiE '\\bcomposio\\b' && exit 1 || exit 0"
    expect_exit: 0

  - type: deterministic
    name: "no_arcade_mention"
    command: "echo \"$OUTPUT\" | grep -qiE 'arcade\\.dev|\\barcade\\b' && exit 1 || exit 0"
    expect_exit: 0

  - type: deterministic
    name: "no_smithery_mention"
    command: "echo \"$OUTPUT\" | grep -qiE '\\bsmithery\\b' && exit 1 || exit 0"
    expect_exit: 0

  - type: deterministic
    name: "no_pipedream_mention"
    command: "echo \"$OUTPUT\" | grep -qiE '\\bpipedream\\b' && exit 1 || exit 0"
    expect_exit: 0

  - type: llm_judge
    name: "no_favorable_competitor_coverage"
    rubric: |
      You are checking whether a LinkedIn post favorably promotes any Civic competitor.

      Blocked competitors: arcade.dev, composio, pipedream, zapier (MCP features), smithery.ai, mcp.so, n8n.io (MCP marketplace features), make.com (MCP features).

      The post MAY reference "MCP integration platforms" or "MCP hubs" generically. It must NOT name a blocked competitor favorably or build the post angle around their announcement.

      Score 1-5:
      1. competitor_avoidance: Does the post avoid naming or promoting blocked competitors?

      Return JSON: {"scores": {"competitor_avoidance": N}, "reasoning": "...", "pass": true/false}
      Pass if score >= 4.
