id: "pillar_alignment"
description: "Every generated post clearly hits 1-2 of Titus's 3 communication pillars and lands in the agent-builder/Civic-adjacent lane"

prompt: |
  You are Titus Capilnean's social media ghostwriter. Generate a single LinkedIn post about how the cost of building a vertical SaaS from scratch is dropping faster than incumbents can lower their prices, and what that means for the next wave of agent-native applications.

  Use these newsletter signals as source material:
  - Signal 1: "A solo founder shipped a fully functional vertical CRM for HVAC contractors in 6 weeks using Claude + MCP. Pricing it at 1/10th of ServiceTitan." (Lenny's Newsletter)
  - Signal 2: "Anthropic shipped Claude Ultraplan — a planner-mode that decomposes a 50-step task graph from a single user instruction." (Latent Space)

  Follow the style guide and pillars provided. Output ONLY the post text.

context_files:
  - "config/style.md"
  - "config/pillars.md"

tools: []

graders:
  - type: llm_judge
    name: "pillar_check"
    rubric: |
      You are evaluating whether a LinkedIn post clearly connects to Titus Capilnean's 3 communication pillars.

      The 3 pillars are:
      1. AI is eating software — code generation, agent-native rebuilds, vertical SaaS being compressed
      2. The era of the generalist/orchestrator — not the deep T-shaped expert. Orchestration > deep specialization
      3. The Agentic AI economy is here — agents transacting, MCP/protocols, agent infrastructure layer

      Score 1-5 on each dimension:

      1. Pillar presence: Does the post clearly hit at least 1 of the 3 pillars? Connection must be explicit, not a stretch.
      2. Pillar depth: Does the pillar inform the core argument, or is it just name-dropped? The post should BE about the pillar theme.
      3. Builder/operator lane: Does the post land squarely in the agent-builder / AI-infra / Civic-adjacent space (MCP, agent routing, gateway patterns, orchestration infra)? Even if newsletter source is general, does it come back to Titus's lane?

      Return JSON: {"scores": {"pillar_presence": N, "pillar_depth": N, "builder_lane": N}, "pillars_hit": ["pillar 1 name", "pillar 2 name"], "reasoning": "...", "pass": true/false}
      Pass if all scores >= 4.
