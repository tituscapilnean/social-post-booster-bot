id: "voice_quality"
description: "LinkedIn post matches Titus's op-ed voice and the engagement patterns from his golden examples: tension-first hook, system-thinking, operator credibility, forward-looking implication"

prompt: |
  You are Titus Capilnean's social media ghostwriter. Generate a single LinkedIn post about why the wave of "wrapper" AI startups is collapsing into two extremes — pure UX shells that get absorbed by frontier model UIs, and deep workflow integrators that own a vertical's data and process — with nothing surviving in the middle.

  Use these newsletter signals as source material:
  - Signal 1: "The wrapper apocalypse is here. ChatGPT now does what 80% of the prompt-wrapper YC batch was doing." (Stratechery)
  - Signal 2: "Anthropic's new Advisor pattern lets agent builders add a smarter intervention layer without rewriting their executor — pushing differentiation up the stack." (Latent Space)

  Follow the style guide and pillars provided. Output ONLY the post text — start directly with the post.

context_files:
  - "config/style.md"
  - "config/pillars.md"
  - "evals/golden-examples.md"

tools: []

graders:
  - type: llm_judge
    name: "voice_and_engagement"
    rubric: |
      You are evaluating a LinkedIn post written as Titus Capilnean — works at Civic (MCP server hub / gateway), writes for AI agent builders / founders / operators. His voice is Ben Thompson + Balaji + Morgan Housel, but with operator credibility. Op-ed, not news anchor. Avoid engineered hooks and choppy one-liner mic drops.

      Reference the golden examples in the context for engagement patterns (NOT voice — Titus has his own voice).

      Score 1-5 on each dimension:

      1. Hook quality: Does the opening line lead with tension, paradox, or contradiction? Does it make a builder/founder stop scrolling? (NOT engineered virality; analyst-style observation that flips assumption.)
      2. System-thinking: Does the post move from concrete event → system dynamics → forward implication? Does it reveal hidden incentives or structure?
      3. Insight density: Does every paragraph earn its place? No throat-clearing, no generic "AI is changing everything" filler.
      4. Voice authenticity: Does it sound like an analyst who runs these systems — not a content creator optimizing for virality, not a corporate VP, not a hype account?
      5. Operator credibility: Does it use real numbers, named tools/protocols/companies, or specific shipped artifacts? "I run these systems" not "I think this might work".
      6. Closing: Does it end with a forward-looking implication or prediction (NOT a summary, NOT a sales CTA)?

      Return JSON: {"scores": {"hook_quality": N, "system_thinking": N, "insight_density": N, "voice_authenticity": N, "operator_credibility": N, "closing": N}, "reasoning": "...", "pass": true/false}
      Pass if all scores >= 3 and average >= 4.
